services:
  db:
    image: postgres:15
    container_name: diet_db
    environment:
      POSTGRES_DB: ${DB_NAME:-diet_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - diet_network

  redis:
    image: redis:alpine
    container_name: diet_redis
    networks:
      - diet_network

  backend:
    build: ./backend
    container_name: diet_backend
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - diet_network

  celery_worker:
    build: ./backend
    container_name: diet_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - diet_network

  celery_beat:
    build: ./backend
    container_name: diet_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    depends_on:
       - db
       - redis
       - backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - diet_network

  frontend:
    build: ./frontend
    container_name: diet_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - diet_network

networks:
  diet_network:
    driver: bridge

volumes:
  postgres_data:
    name: diet_postgres_data
