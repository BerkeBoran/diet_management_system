services:

  db:
    image: postgres:15
    container_name: diet_db
    environment:
      POSTGRES_DB: diet_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: diet_backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=diet_db
      - DB_USER=admin
      - DB_PASSWORD=admin123

  frontend:
    build: ./frontend
    container_name: diet_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend