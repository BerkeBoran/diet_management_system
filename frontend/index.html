<!DOCTYPE html>
<html lang="tr">

<head>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lifeetics.com/" />
  <meta property="og:title" content="Lifeetics: Yapay zeka destekli kişisel diyet yönetim platformu" />

  <meta property="og:image:height" content="192" />
  <meta property="og:locale" content="tr_TR" />

  <!-- Structured Data (Google Logo) -->

  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Lifeetics",
    "url": "https://lifeetics.com",
    "logo": "https://lifeetics.com/favicon-192.png",

    "sameAs": []
  }
  </script>

  <!-- Tüm font aileleri tek istekle, async + display=swap (render'ı bloke etmez) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

  <title>Lifeetics: Yapay zeka destekli kişisel diyet yönetim platformu. Uzman diyetisyenler veya AI diyetisyen ile sağlıklı yaşama başlayın.</title>
