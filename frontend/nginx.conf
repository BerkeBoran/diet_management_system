# HTTP → HTTPS (her iki domain için)
server {
    listen 80;
    server_name lifeetics.com www.lifeetics.com;
    return 301 https://$host$request_uri;
}

# www.lifeetics.com → lifeetics.com (canonical, duplicate page önleme)
server {
    listen 443 ssl;
    server_name www.lifeetics.com;

    ssl_certificate /etc/letsencrypt/live/lifeetics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lifeetics.com/privkey.pem;

    return 301 https://lifeetics.com$request_uri;
}

# Asıl site (non-www, HTTPS)
server {
    listen 443 ssl;
    server_name lifeetics.com;

    ssl_certificate /etc/letsencrypt/live/lifeetics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lifeetics.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Brotli/gzip + buffer ayarları (sıkıştırma performansı için)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/xml+rss application/atom+xml
        image/svg+xml font/ttf font/otf;

    # Hashlenmiş asset'ler immutable (Vite dosya adına content hash'i koyar)
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Resim dosyaları (favicon, logos vs.) - orta vadeli cache
    location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- SEO + React yönlendirmesi ---
    # /foods/kac-kalori                → React arama sayfası (root location / yakalar)
    # /foods/kac-kalori/arama/<query>  → React arama sonuçları (JS interaktif)
    # /foods/kac-kalori/rehber         → Django (alfabetik hub, SSR — SEO için)
    # /foods/kac-kalori/<slug>         → Django (besin detayı, SSR)
    # /kvkk                            → Django (SSR — H1 + içerik bot'a görünür)
    # Sıra önemli: "arama" en önce, sonra slug regex (rehber dahil her şeyi yakalar
    # ve Django kendi içinde /rehber'i hub'a, diğerlerini detay'a yönlendirir).
    location ~ ^/foods/kac-kalori/arama(/|$) {
        try_files /index.html =404;
    }

    location ~ ^/foods/kac-kalori/[A-Za-z0-9_-]+/?$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/kvkk/?$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
